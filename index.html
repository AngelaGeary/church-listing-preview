<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Listing Preview</title>
    <link rel="stylesheet" href="listings.css">
    <style>
        /* Additional styles for the preview interface */
        .preview-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }
        .preview-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        .preview-header h2 {
            margin: 0 0 10px 0;
            color: #2c5282;
            font-size: 1.3em;
        }
        .preview-header p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }
        .listing-wrapper {
            min-height: 200px;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-header">
            <h2>📋 Listing Preview</h2>
            <p>This shows how your church listing will appear</p>
        </div>

        <button class="refresh-button" onclick="loadPreview()">🔄 Refresh Preview</button>

        <div id="preview-content" class="listing-wrapper">
            <div class="loading">Loading your listing preview...</div>
        </div>
    </div>

    <script>
        // Get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Get the record ID and listing type from URL
        const recordId = getUrlParameter('id');
        const listingType = (getUrlParameter('type') || 'standard').toLowerCase();

        // Format phone number
        function formatPhone(phone) {
            if (!phone) return '';
            return `tel: ${phone}`;
        }

        // Generate Standard listing HTML
        function generateStandardListing(data) {
            const cityPrefix = data.countyOrCity ? `${data.countyOrCity}: ` : '';
            
            let html = `<div class="standard">`;
            
            // Church name
            html += `<div class="church-name">${cityPrefix}${data.church}</div>`;
            
            // Address
            if (data.address) {
                html += `<div class="info-line">${data.address}</div>`;
            }
            
            // Meetings/Service times
            if (data.meetings) {
                html += `<div class="info-line">${data.meetings}</div>`;
            }
            
            // Contact with phone
            if (data.contact || data.phone) {
                let contactLine = '';
                if (data.contact) contactLine += data.contact;
                if (data.phone) contactLine += ` (tel: ${data.phone})`;
                html += `<div class="info-line">${contactLine}</div>`;
            }
            
            // Bible version
            if (data.bibles) {
                html += `<div class="info-line"><strong>V:</strong> ${data.bibles}</div>`;
            }
            
            // Hymnbook
            if (data.hymnBooks) {
                html += `<div class="info-line"><strong>HB:</strong> ${data.hymnBooks}</div>`;
            }
            
            // Email
            if (data.email) {
                html += `<div class="info-line"><strong>E:</strong> ${data.email}</div>`;
            }
            
            // Website
            if (data.website) {
                const cleanWebsite = data.website.replace(/^https?:\/\//, '');
                html += `<div class="info-line"><strong>Website:</strong> <a href="https://${cleanWebsite}" target="_blank">${cleanWebsite}</a></div>`;
            }
            
            html += `</div>`;
            return html;
        }

        // Generate Enhanced listing HTML
        function generateEnhancedListing(data) {
            let html = `<div class="enhanced">`;
            
            // Church name
            html += `<div class="church-name">${data.church}</div>`;
            
            // Address
            if (data.address) {
                html += `<div class="info-line">${data.address}</div>`;
            }
            
            // Meetings/Service times
            if (data.meetings) {
                html += `<div class="info-line">${data.meetings}</div>`;
            }
            
            // Contact with phone
            if (data.contact || data.phone) {
                let contactLine = '<strong>Contact:</strong> ';
                if (data.contact) contactLine += data.contact;
                if (data.phone) contactLine += ` (tel: ${data.phone})`;
                html += `<div class="info-line">${contactLine}</div>`;
            }
            
            // Bible version
            if (data.bibles) {
                html += `<div class="info-line"><strong>Bible:</strong> ${data.bibles}</div>`;
            }
            
            // Hymnbook
            if (data.hymnBooks) {
                html += `<div class="info-line"><strong>Hymnbook:</strong> ${data.hymnBooks}</div>`;
            }
            
            // Email
            if (data.email) {
                html += `<div class="info-line"><strong>Email:</strong> ${data.email}</div>`;
            }
            
            // Website
            if (data.website) {
                const cleanWebsite = data.website.replace(/^https?:\/\//, '');
                html += `<div class="info-line"><strong>Website:</strong> <a href="https://${cleanWebsite}" target="_blank">${cleanWebsite}</a></div>`;
            }
            
            html += `</div>`;
            return html;
        }

        // Generate Photo listing HTML
        function generatePhotoListing(data) {
            let html = `<div class="photo">`;
            
            // Church photo
            if (data.churchImage) {
                html += `<img src="${data.churchImage}" alt="${data.church}" class="church-photo">`;
            } else {
                html += `<div style="padding: 15px; background: #f5f5f5; text-align: center; margin-bottom: 8px; border-radius: 8px; font-size: 12px; color: #666;">📷 No photo uploaded yet</div>`;
            }
            
            // Church name
            html += `<div class="church-name">${data.church}</div>`;
            
            // Address
            if (data.address) {
                html += `<div class="info-line">${data.address}</div>`;
            }
            
            // Meetings/Service times
            if (data.meetings) {
                html += `<div class="info-line">${data.meetings}</div>`;
            }
            
            // Contact with phone
            if (data.contact || data.phone) {
                let contactLine = '<strong>Contact:</strong> ';
                if (data.contact) contactLine += data.contact;
                if (data.phone) contactLine += ` (tel: ${data.phone})`;
                html += `<div class="info-line">${contactLine}</div>`;
            }
            
            // Bible version
            if (data.bibles) {
                html += `<div class="info-line"><strong>Bible:</strong> ${data.bibles}</div>`;
            }
            
            // Hymnbook
            if (data.hymnBooks) {
                html += `<div class="info-line"><strong>Hymnbook:</strong> ${data.hymnBooks}</div>`;
            }
            
            // Email
            if (data.email) {
                html += `<div class="info-line"><strong>Email:</strong> ${data.email}</div>`;
            }
            
            // Website
            if (data.website) {
                const cleanWebsite = data.website.replace(/^https?:\/\//, '');
                html += `<div class="info-line"><strong>Website:</strong> <a href="https://${cleanWebsite}" target="_blank">${cleanWebsite}</a></div>`;
            }
            
            html += `</div>`;
            return html;
        }

        // Load and render the preview
        async function loadPreview() {
            const previewContent = document.getElementById('preview-content');
            
            if (!recordId) {
                previewContent.innerHTML = '<div class="error">❌ No church record specified. Please check the URL.</div>';
                return;
            }

            // Show loading state
            previewContent.innerHTML = '<div class="loading">⏳ Loading your listing preview...</div>';

            try {
                // Fetch church data from our serverless function
                const response = await fetch(`/.netlify/functions/get-church?id=${recordId}`);
                
                if (!response.ok) {
                    throw new Error(`Failed to load church data (${response.status})`);
                }

                const data = await response.json();

                // Generate the appropriate listing HTML based on type
                let listingHtml;
                switch (listingType) {
                    case 'enhanced':
                        listingHtml = generateEnhancedListing(data);
                        break;
                    case 'photo':
                        listingHtml = generatePhotoListing(data);
                        break;
                    case 'standard':
                    default:
                        listingHtml = generateStandardListing(data);
                        break;
                }

                previewContent.innerHTML = listingHtml;

            } catch (error) {
                console.error('Error loading preview:', error);
                previewContent.innerHTML = `
                    <div class="error">
                        ❌ Unable to load preview<br>
                        <small>${error.message}</small><br>
                        <small>Please try refreshing the page or contact support.</small>
                    </div>
                `;
            }
        }

        // Load preview on page load
        window.addEventListener('DOMContentLoaded', loadPreview);
    </script>
</body>
</html>
